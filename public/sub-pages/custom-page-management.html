<div class="member-management-container">
  <style>
    .cpm-wrap { padding: 16px; background: #f5f7fb; min-height: calc(100vh - 40px); }
    .cpm-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06); }
    .cpm-head { padding: 16px 20px; border-bottom: 1px solid #edf2f7; }
    .cpm-title { margin: 0; font-size: 22px; color: #1f2937; }
    .cpm-desc { margin: 8px 0 0; color: #64748b; font-size: 13px; }
    .cpm-body { padding: 14px 16px 16px; }
    .cpm-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .cpm-input, .cpm-select, .cpm-table input, .cpm-table select {
      border: 1px solid #dbe4f0; border-radius: 8px; padding: 7px 10px; font-size: 13px; min-width: 150px;
    }
    .cpm-btn { border: 0; border-radius: 8px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
    .cpm-btn-primary { background: #1677ff; color: #fff; }
    .cpm-btn-success { background: #16a34a; color: #fff; }
    .cpm-btn-danger { background: #dc2626; color: #fff; }
    .cpm-btn-light { background: #e2e8f0; color: #334155; }
    .cpm-table { width: 100%; border-collapse: collapse; }
    .cpm-table th, .cpm-table td { border-bottom: 1px solid #edf2f7; padding: 9px; text-align: left; font-size: 13px; vertical-align: middle; }
    .cpm-table th { background: #f8fafc; color: #475569; }
    .cpm-poster { width: 96px; height: 56px; object-fit: cover; border-radius: 6px; border: 1px solid #e5e7eb; }
    .cpm-modal { display:none; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 1100; align-items: center; justify-content: center; }
    .cpm-modal-card { width: 94%; max-width: 1040px; max-height: 88vh; overflow: auto; background: #fff; border-radius: 12px; }
    .cpm-modal-head { padding: 12px 16px; border-bottom: 1px solid #edf2f7; display:flex; justify-content:space-between; align-items:center; }
    .cpm-modal-body { padding: 14px 16px; }
    .cpm-grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .cpm-grid .cpm-input, .cpm-grid .cpm-select { width: 100%; min-width: 0; }
    .cpm-section { margin-bottom: 14px; padding: 10px; border: 1px solid #edf2f7; border-radius: 10px; background: #fafcff; }
    .cpm-section-title { margin: 0 0 8px; font-size: 14px; color: #334155; font-weight: 600; }
    .cpm-upload-row { margin-top:10px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .cpm-checkbox { color:#334155; font-size: 13px; }
    .cpm-subtitle { margin: 6px 0; font-size: 15px; color:#1f2937; }
    .cpm-hint { margin: 6px 0 10px; color: #64748b; font-size: 12px; }
    .cpm-modal-foot { padding: 12px 16px; border-top: 1px solid #edf2f7; display:flex; justify-content:flex-end; gap:8px; }
    .cpm-close { border:0; background:transparent; font-size:22px; cursor:pointer; color:#64748b; }
    .cpm-editor-wrap { display: grid; grid-template-columns: minmax(360px, 1fr) 320px; gap: 12px; align-items: start; }
    .cpm-canvas-shell { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; }
    .cpm-canvas { position: relative; width: 100%; max-width: 620px; margin: 0 auto; border-radius: 8px; overflow: hidden; background: #fff; }
    .cpm-canvas-img { width: 100%; display: block; }
    #cpgHotspotLayer { position: absolute; inset: 0; }
    .cpm-hotspot { position: absolute; border: 2px dashed rgba(22,119,255,.75); background: rgba(22,119,255,.12); cursor: move; box-sizing: border-box; }
    .cpm-hotspot.active { border-color: #dc2626; background: rgba(220,38,38,.12); }
    .cpm-hotspot-handle { position: absolute; width: 12px; height: 12px; right: -6px; bottom: -6px; background: #1677ff; border-radius: 50%; cursor: nwse-resize; border: 2px solid #fff; }
    .cpm-hotspot-label { position: absolute; left: 0; top: 0; transform: translateY(-100%); background: rgba(15,23,42,.8); color: #fff; font-size: 12px; padding: 2px 6px; border-radius: 6px 6px 0 0; white-space: nowrap; }
    .cpm-panel { border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; background: #fff; }
    .cpm-panel-title { font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 8px; }
    .cpm-panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .cpm-panel-full { margin-bottom: 8px; }
    .cpm-hotspot-list { max-height: 220px; overflow: auto; border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px; }
    .cpm-hotspot-item { display:flex; justify-content:space-between; align-items:center; padding:6px; border-radius:6px; cursor:pointer; }
    .cpm-hotspot-item.active { background: #eff6ff; color: #1d4ed8; }
    .cpm-jump-helper { color: #64748b; font-size: 12px; margin-top: 4px; }
  </style>
  <div class="cpm-wrap">
  <div class="cpm-card">
    <div class="cpm-head">
      <h2 class="cpm-title">自定义页面管理</h2>
      <p class="cpm-desc">活动页配置：海报、背景、可点击热区（跳转）、标题与分享开关。小程序路径：<code>/pages/custom-page/custom-page?slug=xxx</code></p>
    </div>
    <div class="cpm-body">
    <div class="cpm-toolbar">
      <input class="cpm-input" id="customPageSearch" placeholder="搜索名称/slug" />
      <select class="cpm-select" id="customPageStatus">
        <option value="">全部状态</option>
        <option value="draft">草稿</option>
        <option value="published">已发布</option>
        <option value="offline">已下线</option>
      </select>
      <button class="cpm-btn cpm-btn-primary" onclick="CustomPageManagement.load()">查询</button>
      <button class="cpm-btn cpm-btn-success" onclick="CustomPageManagement.openCreate()">新增活动页</button>
    </div>
    <table class="cpm-table">
      <thead><tr><th>ID</th><th>名称</th><th>slug</th><th>状态</th><th>海报</th><th>热区数</th><th>分享</th><th>操作</th></tr></thead>
      <tbody id="customPageTableBody"></tbody>
    </table>
    </div>
  </div>

  <div id="customPageModal" class="cpm-modal">
    <div class="cpm-modal-card">
      <div class="cpm-modal-head"><h3 id="customPageModalTitle">新增活动页</h3><button class="cpm-close" onclick="CustomPageManagement.closeModal()">&times;</button></div>
      <div class="cpm-modal-body">
        <div class="cpm-section">
          <h4 class="cpm-section-title">基础信息</h4>
          <div class="cpm-grid">
            <input class="cpm-input" id="cpgName" placeholder="页面名称*" />
            <input class="cpm-input" id="cpgSlug" placeholder="slug*（如 labor-day-2026）" />
            <input class="cpm-input" id="cpgTitle" placeholder="活动页标题" />
            <select class="cpm-select" id="cpgStatus"><option value="draft">草稿</option><option value="published">已发布</option><option value="offline">已下线</option></select>
            <input class="cpm-input" id="cpgStartTime" type="datetime-local" />
            <input class="cpm-input" id="cpgEndTime" type="datetime-local" />
            <input class="cpm-input" id="cpgPosterUrl" placeholder="活动海报URL（必填）" />
            <input class="cpm-input" id="cpgBackground" placeholder="背景色或背景图URL（如 #fff 或 https://...）" />
          </div>
        </div>

        <div class="cpm-section">
          <h4 class="cpm-section-title">分享配置</h4>
          <div class="cpm-grid">
            <input class="cpm-input" id="cpgShareTitle" placeholder="分享标题" />
            <input class="cpm-input" id="cpgShareImage" placeholder="分享图片URL" />
          </div>
          <div class="cpm-upload-row">
            <input class="cpm-input" type="file" id="cpgShareImageFile" accept="image/*">
            <button class="cpm-btn cpm-btn-light" type="button" onclick="CustomPageManagement.uploadShareImage()">上传分享图</button>
            <input class="cpm-input" type="file" id="cpgPosterFile" accept="image/*">
            <button class="cpm-btn cpm-btn-light" type="button" onclick="CustomPageManagement.uploadPosterImage()">上传海报</button>
          </div>
          <div style="margin-top:10px;">
            <label class="cpm-checkbox"><input type="checkbox" id="cpgEnableShare" checked /> 开启分享</label>
          </div>
        </div>

        <hr>
        <h4 class="cpm-subtitle">海报热区（点击跳转）</h4>
        <p class="cpm-hint">可视化编辑：在海报上拖拽热区位置、拖动右下角圆点缩放；右侧可精调与配置跳转。</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;">
          <button class="cpm-btn cpm-btn-primary" type="button" onclick="CustomPageManagement.addHotspot()">新增热区</button>
          <button class="cpm-btn cpm-btn-light" type="button" onclick="CustomPageManagement.removeSelectedHotspot()">删除选中热区</button>
        </div>
        <div class="cpm-editor-wrap">
          <div class="cpm-canvas-shell">
            <div id="cpgEditorCanvas" class="cpm-canvas">
              <img id="cpgEditorPoster" class="cpm-canvas-img" src="" alt="海报预览" />
              <div id="cpgHotspotLayer"></div>
            </div>
          </div>
          <div class="cpm-panel">
            <div class="cpm-panel-title">热区属性</div>
            <div class="cpm-panel-full">
              <input id="cpgSelectedName" class="cpm-input" placeholder="区域名称" />
            </div>
            <div class="cpm-panel-row">
              <input id="cpgSelectedX" class="cpm-input" type="number" step="0.1" placeholder="X%" />
              <input id="cpgSelectedY" class="cpm-input" type="number" step="0.1" placeholder="Y%" />
            </div>
            <div class="cpm-panel-row">
              <input id="cpgSelectedW" class="cpm-input" type="number" step="0.1" placeholder="W%" />
              <input id="cpgSelectedH" class="cpm-input" type="number" step="0.1" placeholder="H%" />
            </div>
            <div class="cpm-panel-full">
              <select id="cpgSelectedJumpType" class="cpm-select">
                <option value="none">不跳转</option>
                <option value="product_detail">商品详情</option>
                <option value="custom_page">自定义页</option>
                <option value="miniapp_page">小程序页</option>
                <option value="tab">Tab页</option>
                <option value="webview">Web链接</option>
              </select>
            </div>
            <div class="cpm-panel-full">
              <input id="cpgSelectedJumpTarget" class="cpm-input" placeholder="跳转目标" />
              <select id="cpgSelectedProduct" class="cpm-select" style="display:none;margin-top:6px;"></select>
              <select id="cpgSelectedCustomPage" class="cpm-select" style="display:none;margin-top:6px;"></select>
              <div id="cpgSelectedJumpHint" class="cpm-jump-helper">不跳转时可留空。</div>
            </div>
            <div style="display:flex;gap:8px;margin:8px 0;">
              <button class="cpm-btn cpm-btn-primary" type="button" onclick="CustomPageManagement.applySelectedHotspot()">应用到热区</button>
            </div>
            <div class="cpm-panel-title">热区列表</div>
            <div id="cpgHotspotList" class="cpm-hotspot-list"></div>
          </div>
        </div>
      </div>
      <div class="cpm-modal-foot">
        <button class="cpm-btn cpm-btn-primary" onclick="CustomPageManagement.save()">保存</button>
        <button class="cpm-btn cpm-btn-light" onclick="CustomPageManagement.closeModal()">取消</button>
      </div>
    </div>
  </div>
  </div>
</div>
