<div class="member-management-container">
  <div class="card">
    <h2>自定义页面管理</h2>
    <p>活动页配置：海报、背景、可点击热区（跳转）、标题与分享开关。小程序路径：<code>/pages/custom-page/custom-page?slug=xxx</code></p>
    <div style="margin: 12px 0; display: flex; gap: 8px; flex-wrap: wrap;">
      <input id="customPageSearch" placeholder="搜索名称/slug" style="padding:8px;min-width:220px;" />
      <select id="customPageStatus" style="padding:8px;">
        <option value="">全部状态</option>
        <option value="draft">草稿</option>
        <option value="published">已发布</option>
        <option value="offline">已下线</option>
      </select>
      <button class="btn btn-primary" onclick="CustomPageManagement.load()">查询</button>
      <button class="btn btn-success" onclick="CustomPageManagement.openCreate()">新增活动页</button>
    </div>
    <table class="table">
      <thead><tr><th>ID</th><th>名称</th><th>slug</th><th>状态</th><th>海报</th><th>热区数</th><th>分享</th><th>操作</th></tr></thead>
      <tbody id="customPageTableBody"></tbody>
    </table>
  </div>

  <div id="customPageModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width:980px;">
      <div class="modal-header"><h3 id="customPageModalTitle">新增活动页</h3></div>
      <div class="modal-body">
        <div class="form-grid">
          <input id="cpgName" placeholder="页面名称*" />
          <input id="cpgSlug" placeholder="slug*（如 labor-day-2026）" />
          <input id="cpgTitle" placeholder="活动页标题" />
          <select id="cpgStatus"><option value="draft">草稿</option><option value="published">已发布</option><option value="offline">已下线</option></select>
          <input id="cpgStartTime" type="datetime-local" />
          <input id="cpgEndTime" type="datetime-local" />
          <input id="cpgShareTitle" placeholder="分享标题" />
          <input id="cpgShareImage" placeholder="分享图片URL" />
          <input id="cpgPosterUrl" placeholder="活动海报URL（必填）" />
          <input id="cpgBackground" placeholder="背景色或背景图URL（如 #fff 或 https://...）" />
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <input type="file" id="cpgShareImageFile" accept="image/*">
          <button class="btn btn-light" type="button" onclick="CustomPageManagement.uploadShareImage()">上传分享图</button>
          <input type="file" id="cpgPosterFile" accept="image/*">
          <button class="btn btn-light" type="button" onclick="CustomPageManagement.uploadPosterImage()">上传海报</button>
        </div>
        <div style="margin-top:10px;">
          <label><input type="checkbox" id="cpgEnableShare" checked /> 开启分享</label>
        </div>

        <hr>
        <h4 style="margin:8px 0;">海报热区（点击跳转）</h4>
        <p style="color:#666;">坐标单位为百分比，建议 0-100。x/y 为左上角位置，w/h 为宽高。</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;">
          <button class="btn btn-primary" type="button" onclick="CustomPageManagement.addHotspot()">新增热区</button>
        </div>
        <table class="table">
          <thead>
            <tr><th>名称</th><th>X%</th><th>Y%</th><th>W%</th><th>H%</th><th>跳转类型</th><th>跳转目标</th><th>操作</th></tr>
          </thead>
          <tbody id="cpgHotspotTableBody"></tbody>
        </table>
      </div>
      <div class="modal-footer" style="margin-top:12px;">
        <button class="btn btn-primary" onclick="CustomPageManagement.save()">保存</button>
        <button class="btn" onclick="CustomPageManagement.closeModal()">取消</button>
      </div>
    </div>
  </div>
</div>
