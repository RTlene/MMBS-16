<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服工作台</title>
    <style>
        .chat-workbench { display: flex; height: calc(100vh - 80px); min-height: 400px; background: #f5f5f5; }
        .chat-side { width: 280px; background: #fff; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; }
        .chat-side h3 { margin: 0; padding: 12px 16px; font-size: 14px; color: #333; border-bottom: 1px solid #eee; }
        .chat-tabs { display: flex; border-bottom: 1px solid #eee; }
        .chat-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 13px; color: #666; }
        .chat-tab.active { color: #1890ff; font-weight: 600; border-bottom: 2px solid #1890ff; margin-bottom: -1px; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-list-item { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .chat-list-item:hover { background: #fafafa; }
        .chat-list-item.active { background: #e6f7ff; }
        .chat-list-item .name { font-weight: 500; color: #333; }
        .chat-list-item .preview { font-size: 12px; color: #999; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; margin: 12px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .chat-main-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; font-size: 14px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
        .chat-msg { margin-bottom: 12px; display: flex; }
        .chat-msg.staff { flex-direction: row-reverse; }
        .chat-msg .bubble { max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 14px; word-break: break-word; }
        .chat-msg.member .bubble { background: #f0f0f0; color: #333; }
        .chat-msg.staff .bubble { background: #1890ff; color: #fff; }
        .chat-msg .bubble img { max-width: 200px; border-radius: 4px; }
        .chat-input-area { padding: 12px; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: flex-end; }
        .chat-input-area textarea { flex: 1; min-height: 40px; max-height: 120px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; resize: none; font-size: 14px; }
        .chat-input-area button { padding: 8px 16px; border: none; border-radius: 6px; background: #1890ff; color: #fff; cursor: pointer; font-size: 14px; }
        .chat-input-area button:disabled { background: #ccc; cursor: not-allowed; }
        .quick-reply-btn { margin-left: 4px; padding: 6px 12px; font-size: 12px; background: #f5f5f5; border-radius: 4px; cursor: pointer; }
        .conv-header { padding: 12px 16px; border-bottom: 1px solid #eee; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
        .conv-header .end-btn { padding: 4px 12px; font-size: 12px; background: #ff4d4f; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="chat-workbench">
    <div class="chat-side">
        <h3>客服工作台</h3>
        <div class="chat-tabs">
            <span class="chat-tab active" data-tab="queue">排队</span>
            <span class="chat-tab" data-tab="mine">我的会话</span>
        </div>
        <div class="chat-list" id="chat-queue-list"></div>
        <div class="chat-list" id="chat-mine-list" style="display:none;"></div>
    </div>
    <div class="chat-main">
        <div class="chat-main-empty" id="chat-main-empty">请从左侧选择排队会话接入，或选择「我的会话」继续接待</div>
        <div id="chat-conv-area" style="display:none;">
            <div class="conv-header" id="chat-conv-header">
                <span id="chat-conv-title">会员</span>
                <button type="button" class="end-btn" id="chat-end-btn">结束会话</button>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <textarea id="chat-input" placeholder="输入消息..." rows="1"></textarea>
                <button type="button" id="chat-send-btn">发送</button>
                <button type="button" class="quick-reply-btn" id="chat-quick-reply-btn">快捷话术</button>
            </div>
        </div>
    </div>
</div>
<script src="../js/chat-workbench.js"></script>
</body>
</html>
