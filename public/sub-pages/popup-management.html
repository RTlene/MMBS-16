<div class="popup-management-container">
    <style>
        .popup-management-container { padding: 16px; background: #f5f7fb; min-height: 100vh; }
        .pm-card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 14px; }
        .pm-head { padding: 16px 20px; border-bottom: 1px solid #eef2f7; }
        .pm-title { margin: 0; font-size: 22px; color: #1f2937; }
        .pm-desc { margin: 8px 0 0; color: #6b7280; font-size: 13px; }
        .pm-tabs { display: flex; gap: 8px; padding: 12px 16px; }
        .pm-tab { border: 1px solid #dbe4f0; background: #fff; color: #334155; border-radius: 8px; padding: 8px 14px; cursor: pointer; }
        .pm-tab.active { background: #1677ff; color: #fff; border-color: #1677ff; }
        .pm-panel { display: none; padding: 14px 16px 18px; }
        .pm-panel.active { display: block; }
        .pm-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .pm-input, .pm-select, .pm-textarea { border: 1px solid #dbe4f0; border-radius: 8px; padding: 8px 10px; font-size: 13px; }
        .pm-input, .pm-select { min-width: 160px; }
        .pm-textarea { width: 100%; min-height: 90px; }
        .btn { padding: 7px 12px; border: 0; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .btn-primary { background: #1677ff; color: #fff; }
        .btn-success { background: #16a34a; color: #fff; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-warning { background: #f59e0b; color: #fff; }
        .btn-light { background: #e2e8f0; color: #334155; }
        .pm-table { width: 100%; border-collapse: collapse; }
        .pm-table th, .pm-table td { border-bottom: 1px solid #edf2f7; padding: 9px; text-align: left; font-size: 13px; }
        .pm-table th { color: #475569; background: #f8fafc; }
        .pm-table tr:hover { background: #f8fbff; }
        .pm-img { width: 96px; height: 56px; object-fit: cover; border-radius: 6px; border: 1px solid #e5e7eb; }
        .pm-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; }
        .pm-badge-active { background: #dcfce7; color: #166534; }
        .pm-badge-inactive { background: #fff7ed; color: #9a3412; }
        .pm-modal { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 1000; align-items: center; justify-content: center; }
        .pm-modal.show { display: flex; }
        .pm-modal-card { width: 92%; max-width: 900px; max-height: 86vh; overflow: auto; background: #fff; border-radius: 12px; }
        .pm-modal-head { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .pm-modal-body { padding: 14px 16px; }
        .pm-modal-foot { padding: 12px 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; justify-content: flex-end; }
        .pm-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pm-close { border: none; background: transparent; font-size: 22px; cursor: pointer; color: #64748b; }
    </style>

    <div class="pm-card">
        <div class="pm-head">
            <h1 class="pm-title">弹窗与活动页面管理</h1>
            <p class="pm-desc">已整合：站内弹窗、首页活动弹窗（多活动轮播）、自定义活动页面</p>
        </div>
        <div class="pm-tabs">
            <button class="pm-tab active" data-tab="site">站内弹窗</button>
            <button class="pm-tab" data-tab="campaign">活动弹窗（首页轮播）</button>
            <button class="pm-tab" data-tab="custom">自定义页面</button>
        </div>
    </div>

    <div class="pm-card pm-panel active" id="panel-site">
        <div class="pm-toolbar">
            <input class="pm-input" id="searchInput" placeholder="弹窗名称">
            <select class="pm-select" id="typeFilter"><option value="">全部类型</option><option value="ad">广告</option><option value="notice">通知</option><option value="promotion">促销</option></select>
            <select class="pm-select" id="statusFilter"><option value="">全部状态</option><option value="active">有效</option><option value="inactive">无效</option></select>
            <button class="btn btn-primary" onclick="searchPopups()">搜索</button>
            <button class="btn btn-success" onclick="showAddPopupModal()">新增站内弹窗</button>
        </div>
        <table class="pm-table">
            <thead><tr><th>ID</th><th>名称</th><th>类型</th><th>状态</th><th>预览</th><th>频率</th><th>开始</th><th>结束</th><th>操作</th></tr></thead>
            <tbody id="popupTableBody"></tbody>
        </table>
        <div id="pagination" style="margin-top:10px;"></div>
    </div>

    <div class="pm-card pm-panel" id="panel-campaign">
        <div class="pm-toolbar">
            <input class="pm-input" id="campaignPopupSearch" placeholder="活动名称">
            <select class="pm-select" id="campaignPopupStatus"><option value="">全部状态</option><option value="draft">草稿</option><option value="active">生效</option><option value="inactive">停用</option></select>
            <button class="btn btn-primary" onclick="PopupManagement.loadCampaign()">搜索</button>
            <button class="btn btn-success" onclick="PopupManagement.openCampaignCreate()">新增活动</button>
            <button class="btn btn-warning" onclick="PopupManagement.previewCampaign()">轮播预览</button>
        </div>
        <table class="pm-table">
            <thead><tr><th>ID</th><th>活动名称</th><th>状态</th><th>优先级</th><th>封面</th><th>时间窗</th><th>跳转</th><th>操作</th></tr></thead>
            <tbody id="campaignPopupTableBody"></tbody>
        </table>
    </div>

    <div class="pm-card pm-panel" id="panel-custom">
        <div class="pm-toolbar">
            <input class="pm-input" id="customPageSearch" placeholder="名称/slug">
            <select class="pm-select" id="customPageStatus"><option value="">全部状态</option><option value="draft">草稿</option><option value="published">已发布</option><option value="offline">已下线</option></select>
            <button class="btn btn-primary" onclick="PopupManagement.loadCustom()">搜索</button>
            <button class="btn btn-success" onclick="PopupManagement.openCustomCreate()">新增页面</button>
        </div>
        <table class="pm-table">
            <thead><tr><th>ID</th><th>名称</th><th>slug</th><th>状态</th><th>分享</th><th>操作</th></tr></thead>
            <tbody id="customPageTableBody"></tbody>
        </table>
    </div>

    <div class="pm-modal" id="popupModal">
        <div class="pm-modal-card">
            <div class="pm-modal-head"><h3 id="popupModalTitle">新增站内弹窗</h3><button class="pm-close" onclick="closePopupModal()">&times;</button></div>
            <div class="pm-modal-body">
                <form id="popupForm">
                    <div class="pm-grid-2">
                        <input class="pm-input" id="popupName" placeholder="弹窗名称*" required>
                        <select class="pm-select" id="popupType"><option value="ad">广告</option><option value="notice">通知</option><option value="promotion">促销</option></select>
                        <select class="pm-select" id="popupFrequency"><option value="once">仅一次</option><option value="daily">每日一次</option><option value="session">每次会话</option><option value="always">总是显示</option></select>
                        <select class="pm-select" id="popupStatus"><option value="active">有效</option><option value="inactive">无效</option></select>
                        <input class="pm-input" type="datetime-local" id="popupStartTime">
                        <input class="pm-input" type="datetime-local" id="popupEndTime">
                    </div>
                    <div style="margin-top:10px;">
                        <input class="pm-input" id="popupLink" placeholder="跳转链接（可选）" style="min-width:100%;">
                    </div>
                    <div style="margin-top:10px;">
                        <input type="file" id="popupImage" accept="image/*">
                        <img id="imagePreview" class="pm-img" style="display:none;margin-top:8px;">
                        <img id="popupPreview" class="pm-img" style="display:none;margin-top:8px;">
                        <div id="noPreview" style="color:#64748b;">请上传图片查看预览</div>
                    </div>
                    <div style="margin-top:10px;display:flex;gap:12px;flex-wrap:wrap;">
                        <label><input type="checkbox" id="showToMembers" checked> 会员</label>
                        <label><input type="checkbox" id="showToGuests" checked> 游客</label>
                        <label><input type="checkbox" id="showOnMobile" checked> 移动端</label>
                        <label><input type="checkbox" id="showOnDesktop" checked> 桌面端</label>
                    </div>
                </form>
            </div>
            <div class="pm-modal-foot">
                <button class="btn btn-primary" onclick="savePopup()">保存</button>
                <button class="btn btn-light" onclick="closePopupModal()">取消</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="campaignPopupModal">
        <div class="pm-modal-card">
            <div class="pm-modal-head"><h3 id="campaignPopupModalTitle">新增活动弹窗</h3><button class="pm-close" onclick="PopupManagement.closeCampaignModal()">&times;</button></div>
            <div class="pm-modal-body">
                <div class="pm-grid-2">
                    <input class="pm-input" id="cpName" placeholder="活动名称*">
                    <input class="pm-input" id="cpTitle" placeholder="活动标题">
                    <select class="pm-select" id="cpStatus"><option value="draft">草稿</option><option value="active">生效</option><option value="inactive">停用</option></select>
                    <input class="pm-input" id="cpPriority" type="number" placeholder="优先级">
                    <input class="pm-input" id="cpStartTime" type="datetime-local">
                    <input class="pm-input" id="cpEndTime" type="datetime-local">
                    <select class="pm-select" id="cpJumpType"><option value="none">不跳转</option><option value="miniapp_page">小程序页</option><option value="tab">Tab页</option><option value="custom_page">自定义页</option><option value="webview">Web链接</option></select>
                    <input class="pm-input" id="cpJumpTarget" placeholder="跳转目标">
                </div>
                <div style="margin-top:10px;"><label><input type="checkbox" id="cpShowOnce" checked> 每会员每周期仅弹一次</label></div>
                <div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <input type="file" id="cpImageFiles" accept="image/*" multiple>
                    <button class="btn btn-light" type="button" onclick="PopupManagement.uploadCampaignImages()">上传图片到对象存储</button>
                    <span style="color:#64748b;font-size:12px;">可多选，上传后自动写入下方 URL 列表</span>
                </div>
                <div style="margin-top:10px;"><textarea class="pm-textarea" id="cpImageUrls" placeholder="轮播图URL，一行一个"></textarea></div>
            </div>
            <div class="pm-modal-foot">
                <button class="btn btn-primary" onclick="PopupManagement.saveCampaign()">保存</button>
                <button class="btn btn-light" onclick="PopupManagement.closeCampaignModal()">取消</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="customPageModal">
        <div class="pm-modal-card">
            <div class="pm-modal-head"><h3 id="customPageModalTitle">新增自定义页面</h3><button class="pm-close" onclick="PopupManagement.closeCustomModal()">&times;</button></div>
            <div class="pm-modal-body">
                <div class="pm-grid-2">
                    <input class="pm-input" id="cpgName" placeholder="页面名称*">
                    <input class="pm-input" id="cpgSlug" placeholder="slug*">
                    <input class="pm-input" id="cpgTitle" placeholder="页面标题">
                    <select class="pm-select" id="cpgStatus"><option value="draft">草稿</option><option value="published">已发布</option><option value="offline">已下线</option></select>
                    <input class="pm-input" id="cpgStartTime" type="datetime-local">
                    <input class="pm-input" id="cpgEndTime" type="datetime-local">
                    <input class="pm-input" id="cpgShareTitle" placeholder="分享标题">
                    <input class="pm-input" id="cpgShareImage" placeholder="分享图片URL">
                </div>
                <div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <input type="file" id="cpgShareImageFile" accept="image/*">
                    <button class="btn btn-light" type="button" onclick="PopupManagement.uploadCustomShareImage()">上传分享图到对象存储</button>
                </div>
                <div style="margin-top:10px;"><label><input type="checkbox" id="cpgEnableShare" checked> 开启分享</label></div>
                <div style="margin-top:10px;"><textarea class="pm-textarea" id="cpgSchemaJson" placeholder='页面JSON数组，例如：[{"type":"image","url":"https://..."},{"type":"text","text":"五一活动"}]'></textarea></div>
            </div>
            <div class="pm-modal-foot">
                <button class="btn btn-primary" onclick="PopupManagement.saveCustom()">保存</button>
                <button class="btn btn-light" onclick="PopupManagement.closeCustomModal()">取消</button>
            </div>
        </div>
    </div>

    <div class="pm-modal" id="campaignPreviewModal">
        <div class="pm-modal-card" style="max-width:460px;">
            <div class="pm-modal-head"><h3>首页轮播预览</h3><button class="pm-close" onclick="PopupManagement.closeCampaignPreview()">&times;</button></div>
            <div class="pm-modal-body">
                <img id="campaignPreviewImage" src="" style="width:100%;max-height:420px;object-fit:cover;border-radius:8px;">
                <div id="campaignPreviewTitle" style="font-weight:600;margin-top:8px;"></div>
                <div id="campaignPreviewMeta" style="color:#64748b;margin-top:4px;"></div>
            </div>
            <div class="pm-modal-foot">
                <button class="btn btn-light" onclick="PopupManagement.campaignPreviewPrev()">上一张</button>
                <button class="btn btn-light" onclick="PopupManagement.campaignPreviewNext()">下一张</button>
            </div>
        </div>
    </div>
</div>
